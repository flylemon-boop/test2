# Usage: uv run capx/envs/launch.py --config-path env_configs/two_arm_handover/hillclimb/debug_multimodel_two_arm_handover_multiturn_vdm_reduced_api_skill_lib.yaml

env:
  _target_: capx.envs.tasks.franka.two_arm_handover.TwoArmHandoverCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level: two_arm_handover_robosuite  # Registry name for low-level env
    apis:
      - FrankaControlApiReducedSkillLibraryBimanualHandover
    prompt: |
      You are controlling a two-arm Franka Emika robot system with API described below.
      Goal: Arm 0 should pick up the hammer, lift it, and hand it over to Arm 1. Arm 1 should then grasp the hammer handle (not hammer head). The z-value of hammer must be between 0.15 and 0.20 during the handover to count as a success.

      Coordinate system:
      - All pose functions accept positions in robot0's base frame (same coordinate system as returned/used by get_object_pose/goto_pose_arm*).
      - The table surface is not necessarily at z=0.
      - The coordinate axis follows these conventions:
        - Z-axis: up (positive) and down (negative)
        - X-axis: right (positive) and left (negative) 
        - Y-axis: forward (positive) and backward (negative)
      
      Environment details:
      - Arm 0 (left) and Arm 1 (right) are positioned on opposite sides of the table. 
      - The hammer handle length is randomized between 0.15m and 0.25m.
      - The hammer initially lies flat on the table, aligned along the Y-axis, with the handle toward +Y and the hammer head toward -Y

      Critical information:
      - Handover must occur near the midpoint of the initial gripper positions. Reason about the best handover hammer orientation that allows collision-free transfer to Arm 1.
      - The table does not span the entire region between the two arms. If the hammer falls in the central gap it will drop to the floor, making the task UNRECOVERABLE
      - AVOID COLLISIONS. You must decompose movements into rotation and translation components, moving stepwise. Reason about the optimal sequence of waypoints to safely avoid collisions.
      - Arm links have volume, and intermediate motions are not collision-checked. Keep a minimum 8cm buffer between grippers

      Reference quaternions:
      - Arm0 gripper facing down opening along X-axis: [0, 0.707, 0.707, 0].
      - Arm0 gripper facing down opening along Y-axis: [0, 1, 0, 0].
      - Arm1 gripper facing down opening along Y-axis: [0, 0, 1, 0].

      Arm gripper approximate initial starting positions (robot0 frame). These values are rough and may vary by a few centimeters each trial:
      - Arm0: x ≈ 0.44. y ≈ 0.0
      - Arm1: x ≈ 1.18. y ≈ 0.0

      You may write python code comments for reasoning but ONLY write the executable Python code and do not write it in code fences.
      After this code executes, you will receive the current console stdout and stderr (any errors or print statements made in the code). You will then have the chance to write new code to query the environment state and/or complete the task.
      The functions (APIs) below are already imported to the environment. If you want to use numpy, you need to import it explicitly.
    
    multi_turn_prompt: |
      You are acting as experienced debugger and task completion verifier. You will make no assumptions without explicit evidence.
      Your task is to determine whether the program has actually completed the intended task, and to fix all bugs if any exist.
      You can treat the observed differences between the current and previous state of the environment that are provided to you as a source of evidence, but they are not guaranteed to be accurate.

      The following code blocks have been executed so far:
      ```python
      {executed_code}
      ```
      The current console stdout from the most recent code execution is:
      ```
      {console_stdout}
      ```
      The current console stderr from the most recent code execution is:
      ```
      {console_stderr}
      ```

      Do NOT trust printed outputs or logs blindly.

      Proceed as follows to verify task completion:
      1. Line-by-line inspect the executed code
      2. Cross-check the code's behavior against the console stdout and stderr
      3. Identify explicit, concrete evidence that each required step of the task was completed
      4. Treat missing evidence, implicit assumptions, or partial signals as failure

      Decision Rules:
      - If the task is verifiably complete, respond with the single word 'FINISH'.
      - If the task is not verifiably complete:
        1. Identify specific bugs, failures, missing steps, or incorrect assumptions.
        2. Explain why each issue prevents task completion, citing evidence from stdout, stderr, or code behavior.
        3. If the same approach has been attempted multiple times without success, you MUST try a fundamentally different strategy.
        4. Brainstorm multiple strategies to fix or verify these issues in the next code generation.
        5. Synthesize your brainstorming into a single improved Python program that addresses all identified issues and verifiably completes the task.
        6. Respond with the single word 'REGENERATE' followed immediately by new Python code in a fenced code block (```python...```)
      
      If you choose to regenerate code, you must include your reasoning process only AS COMMENTS at the start of the code explaining:
      - What strategies/APIs have already been tried and why they were insufficient
      - How your solution effectively addresses the identified issues

      To reiterate, you must only respond with EXACTLY ONE of the following:
      - The word 'FINISH' if you decide to stop generating code
      - The word 'REGENERATE' followed immediately by new Python code in a SINGLE fenced code block (```python...```).

api_servers:
  - _target_: capx.serving.launch_sam3_server.main
    device: cuda
    port: 8114
    host: 127.0.0.1

  - _target_: capx.serving.launch_contact_graspnet_server.main
    port: 8115
    host: 127.0.0.1

  - _target_: capx.serving.launch_pyroki_server.main
    port: 8116
    host: 127.0.0.1
    robot: panda_description
    target_link: panda_hand

record_video: true
use_parallel_ensemble: true
use_multimodel: true
output_dir: ./outputs/debug_multimodel_two_arm_handover_multiturn_vdm_reduced_api_skill_lib
use_img_differencing: true

trials: 100
num_workers: 5
use_oracle_code: false
