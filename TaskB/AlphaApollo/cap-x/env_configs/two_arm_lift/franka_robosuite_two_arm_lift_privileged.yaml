# Usage: uv run capx/envs/launch.py --config-path env_configs/two_arm_lift/franka_robosuite_two_arm_lift_privileged.yaml

env:
  _target_: capx.envs.tasks.franka.two_arm_lift.TwoArmLiftCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level: two_arm_lift_robosuite  # Registry name for low-level env
    privileged: true
    apis:
      - FrankaTwoArmLiftPrivilegedApi
    # prompt is inherited from TwoArmLiftCodeEnv class default

api_servers:
  - _target_: capx.serving.launch_pyroki_server.main
    port: 8116
    host: 127.0.0.1
    robot: panda_description
    target_link: panda_hand

record_video: true
output_dir: ./outputs/franka_robosuite_two_arm_lift_privileged

trials: 100
num_workers: 12
use_oracle_code: false

