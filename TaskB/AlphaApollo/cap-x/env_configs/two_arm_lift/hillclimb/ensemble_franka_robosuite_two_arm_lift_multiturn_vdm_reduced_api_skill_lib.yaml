# Usage: uv run capx/envs/launch.py --config-path env_configs/two_arm_lift/hillclimb/ensemble_franka_robosuite_two_arm_lift_multiturn_vdm_reduced_api_skill_lib.yaml

env:
  _target_: capx.envs.tasks.franka.two_arm_lift.TwoArmLiftCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level: two_arm_lift_robosuite  # Registry name for low-level env
    apis:
      - FrankaControlApiReducedSkillLibraryBimanual
    prompt: |
      You are controlling a two-arm Franka Emika robot system on opposite sides of the table with API described below.
      Goal: The two arms should coordinate to lift a pot. Arm 0 should grasp handle 0, and Arm 1 should grasp handle 1. Then both arms should lift the pot up at the same height.

      Guidance:
      - The pot is in the center of the table and has two handles on opposite sides.
      - One handle0 is green and the other handle1 is blue, and the main body of the pot is red.
      - You may want to slightly lift both arms first to avoid occluding the pot and handles.
      - Avoid using top-down grasps, i.e. avoid using quaternion wxyz [0, 0, 1, 0] for the approach.
      - Sideways grasps are preferred with the y-axis of the gripper aligned with the world z-axis.
      - Coordinate system: All pose functions accept/return positions in robot0's base frame.

      You may write python code comments for reasoning but ONLY write the executable Python code and do not write it in code fences.
      After this code executes, you will receive the current console stdout and stderr (any errors or print statements made in the code). You will then have the chance to write new code to query the environment state and/or complete the task.
      The functions (APIs) below are already imported to the environment. If you want to use numpy, you need to import it explicitly.
    
    multi_turn_prompt: |
      The following code blocks were just executed:
      ```python
      {executed_code}
      ```
      The current console stdout is:
      ```
      {console_stdout}
      ```
      The current console stderr is:
      ```
      {console_stderr}
      ```
      If there were no errors during compilation or execution, the console stderr will be empty. If there were errors, consider regenerating the code.
      Consider querying the environment state through perception-based tool calls and prints to see if the task is completed.
      Please respond with EXACTLY ONE of the following:
      - The word 'REGENERATE' followed immediately by new Python code in a fenced code block (```python...```) if you want to modify the code.
      - The word 'FINISH' if the task appears to be complete

api_servers:
  - _target_: capx.serving.launch_sam3_server.main
    device: cuda
    port: 8114
    host: 127.0.0.1

  - _target_: capx.serving.launch_contact_graspnet_server.main
    port: 8115
    host: 127.0.0.1
    
  - _target_: capx.serving.launch_pyroki_server.main
    port: 8116
    host: 127.0.0.1
    robot: panda_description
    target_link: panda_hand

record_video: true
use_parallel_ensemble: true
output_dir: ./outputs/ensemble_franka_robosuite_two_arm_lift_multiturn_vdm_reduced_api_skill_lib
use_img_differencing: true

trials: 100
num_workers: 5
use_oracle_code: false
